{% extends "base.html" %}
{% block title %}LINE 對話分析 - {{ case.name }}{% endblock %}
{% block content %}
  <h2>{{ case.name }} - LINE 對話分析</h2>
  <div class="card">
    <div class="section-title" style="margin-top:0;">貼上當日群組對話</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/cases/{{ case.id }}/contact-records/line-analysis">
      <div class="form-grid">
        <div><label>紀錄日期</label><input type="date" name="contact_date" value="{{ today }}" required></div>
        <div>
          <label>對象類型</label>
          <select id="contact-type-select" name="contact_type">
            <option value="">自動判斷</option>
            {% for option in contact_type_options %}
            <option value="{{ option.value }}">{{ option.label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label>內容類型</label>
          <select id="phone-call-type-select" name="phone_call_type">
            <option value="">自動判斷</option>
          </select>
        </div>
        <div><label>LINE 群組ID</label><input value="{{ case.line_group_id or '尚未設定' }}" disabled></div>
        <div class="full">
          <label>群組對話內容</label>
          <textarea name="raw_text" rows="14" placeholder="可貼上當天群組對話。系統會分類為服務異動、增加服務需求、意見反應、申訴、諮詢或其他，並建立電訪紀錄草稿。" required></textarea>
        </div>
      </div>
      <button class="btn" type="submit" style="margin-top:1rem;">分析並建立紀錄</button>
      <a class="btn btn-secondary" href="/cases/{{ case.id }}?tab=contact" style="margin-left:0.5rem;">取消</a>
    </form>
  </div>
  <script>
    (() => {
      const optionsByTarget = {
        {% for target, options in phone_call_type_options.items() %}
        "{{ target }}": [{% for option in options %}{ value: "{{ option.value }}", label: "{{ option.value.split('：', 1)[-1] }}" }{% if not loop.last %},{% endif %}{% endfor %}]{% if not loop.last %},{% endif %}
        {% endfor %}
      };
      const targetSelect = document.getElementById('contact-type-select');
      const typeSelect = document.getElementById('phone-call-type-select');
      const refreshTypes = () => {
        const current = typeSelect.value;
        const options = optionsByTarget[targetSelect.value] || [];
        typeSelect.innerHTML = '<option value="">自動判斷</option>';
        options.forEach(option => {
          const node = document.createElement('option');
          node.value = option.value;
          node.textContent = option.label;
          node.selected = option.value === current;
          typeSelect.appendChild(node);
        });
      };
      targetSelect.addEventListener('change', refreshTypes);
      refreshTypes();
    })();
  </script>
{% endblock %}

{% extends "base.html" %}
{% block title %}變更密碼{% endblock %}
{% block content %}
  <h2>變更密碼</h2>
  {% if password_change_required %}
  <div class="card" style="background:#fffaf2; border-left:5px solid #b9770e;">
    <strong>此帳號使用臨時密碼登入，請先變更密碼。</strong>
  </div>
  {% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <div class="card" style="max-width:560px;">
    <form method="post" action="/change-password">
      {% if not password_change_required %}
      <div><label>目前密碼</label><input type="password" name="current_password" autocomplete="current-password" required></div>
      {% endif %}
      <div style="margin-top:0.8rem;"><label>新密碼</label><input type="password" name="new_password" minlength="8" autocomplete="new-password" required></div>
      <div style="margin-top:0.8rem;"><label>確認新密碼</label><input type="password" name="confirm_password" minlength="8" autocomplete="new-password" required></div>
      <button class="btn" type="submit" style="margin-top:1rem;">儲存新密碼</button>
    </form>
  </div>
{% endblock %}

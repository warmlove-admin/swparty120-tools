{% extends "base.html" %}{% block title %}目標檢討{% endblock %}{% block content %}<h2>{{ case.name }}｜{{ assessment.assessment_date }} 目標檢討</h2><form method="post" action="/cases/{{ case.id }}/assessments/{{ assessment.id }}/goal-review">{% for goal in goals %}<div class="card"><strong>[{{ goal.domain }}] {{ goal.description }}</strong><div class="form-grid" style="margin-top:1rem;"><div><label>達成情形</label><select name="achievement_{{ goal.id }}"><option>達成</option><option>部分達成</option><option>未達成</option></select></div><div><label>後續決定</label><select name="decision_{{ goal.id }}"><option>結案</option><option>繼續延用</option><option>更換為新目標</option></select></div><div class="full"><label>原因／評估說明（沿用或更換時必填）</label><textarea name="reason_{{ goal.id }}" rows="2"></textarea></div></div></div>{% else %}<div class="card">目前沒有進行中的目標。</div>{% endfor %}<button class="btn">儲存目標檢討</button><a class="btn btn-secondary" href="/cases/{{ case.id }}/assessments/{{ assessment.id }}">取消</a></form>{% endblock %}

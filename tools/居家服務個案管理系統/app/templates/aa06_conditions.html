{% extends "base.html" %}
{% block title %}AA06 條件設定 - {{ case.name }}{% endblock %}
{% block content %}

<h2>AA06 條件設定：{{ case.name }}</h2>

<form method="post" action="/transport-salary/aa06-conditions/{{ case.id }}?month={{ request.query_params.month }}">
  <div class="card" style="margin-bottom:1rem;">
    <p style="margin-top:0; color:#666;">請選擇此個案符合的 AA06 條件（可複選）：</p>
    {% for opt in condition_options %}
    <label style="display:block; margin:0.5rem 0; padding:0.5rem; background:#f5f5f5; border-radius:4px; cursor:pointer;">
      <input type="checkbox" name="conditions" value="{{ opt.num }}"
        {% if opt.num in current_conditions %}checked{% endif %}
        style="margin-right:0.5rem;">
      <strong>條件 {{ opt.num }}</strong>：{{ opt.desc }}
    </label>
    {% endfor %}
  </div>
  <div style="display:flex; gap:0.5rem;">
    <button type="submit" class="btn">儲存條件</button>
    <a href="/transport-salary?tab=aa_bonus" class="btn btn-secondary">取消</a>
  </div>
</form>

{% endblock %}
